syntax = "proto3";

// Aethereum-Spine Root Spine — Orchestrator gRPC Service
// Version: 1.0.0
//
// This file is the contract between the Go aethereum-spine and every factory,
// control panel, and external agent. All fields are commented.
// Breaking changes require a filed proposal in proposals/.

package sati.central.v1;

option go_package = "github.com/rds/aethereum-spine/aethereum-spine/internal/grpc/pb;pb";

// ─────────────────────────────────────────────────────────────────────────────
// Service definition
// ─────────────────────────────────────────────────────────────────────────────

// Orchestrator is the central control plane for Aethereum-Spine.
// It manages factory lifecycles, the safety verification pipeline,
// the fitness vector, Dhamma context retrieval, and the analyst interface.
service Orchestrator {

  // ── Factory lifecycle ──────────────────────────────────────────────────────

  // CreateFactory instantiates and registers a new agent factory.
  // Returns the factory ID and initial fitness baseline.
  rpc CreateFactory(FactoryRequest) returns (FactoryResponse);

  // StopFactory gracefully shuts down a running factory.
  // Waits for in-flight proposals to complete before stopping.
  rpc StopFactory(FactoryID) returns (OperationStatus);

  // ListFactories returns all registered factories and their current status.
  rpc ListFactories(Empty) returns (FactoryList);

  // ── Safety pipeline ────────────────────────────────────────────────────────

  // SubmitProposal submits an ActionProposal for safety verification.
  // Returns a stream of VerificationEvents as the proposal progresses
  // through: received → verifying → verdict → [gate_pending] → committed/vetoed.
  rpc SubmitProposal(ActionProposal) returns (stream VerificationEvent);

  // ApproveAction signs a Translucent Gate approval for a security-adjacent proposal.
  // Requires a valid ApprovalSignature. Returns a MerkleProof for the committed leaf.
  rpc ApproveAction(ApprovalRequest) returns (MerkleProof);

  // VetoAction issues a veto on a pending proposal.
  // May be called by the Analyst Droid or the human operator.
  rpc VetoAction(VetoRequest) returns (OperationStatus);

  // ── Fitness vector ─────────────────────────────────────────────────────────

  // GetFitnessSnapshot returns the current global fitness vector state.
  // Equivalent to reading otel-snapshots/latest.json but via RPC.
  rpc GetFitnessSnapshot(Empty) returns (FitnessSnapshot);

  // RegisterDomainMetrics registers domain-specific fitness metric extensions.
  // Called by factories at startup to advertise their domain metrics.
  rpc RegisterDomainMetrics(DomainFitnessExtension) returns (RegistrationResult);

  // ── Dhamma context ─────────────────────────────────────────────────────────

  // GetDhammaContext retrieves a scored Dhamma reflection for a given data context.
  // Used by the Translucent Gate to annotate proposals with ethical weighting.
  rpc GetDhammaContext(DataContext) returns (ReflectionResult);

  // ── Analyst interface ──────────────────────────────────────────────────────

  // WriteAnalystBriefing writes a briefing packet to analyst-inbox/.
  // Called by AntiGravity when it has completed a phase and needs review.
  rpc WriteAnalystBriefing(Briefing) returns (OperationStatus);

  // ReadAnalystVerdict reads the latest verdict for a given topic or proposal.
  // Called by AntiGravity to check if a verdict has been issued.
  rpc ReadAnalystVerdict(VerdictQuery) returns (AnalystVerdict);

  // ── Factory metrics reporting ──────────────────────────────────────────────

  // ReportMetrics submits domain-specific metric values to the global fitness vector.
  // Called periodically by factories after their internal collection loops.
  rpc ReportMetrics(MetricReport) returns (OperationStatus);

  // ── Assembly line lifecycle (Phase 7) ──────────────────────────────────────

  // CreateAssemblyLine initiates a new software service assembly line from a spec.
  rpc CreateAssemblyLine(SpecDocument)      returns (AssemblyLine);

  // GetAssemblyLineStatus returns the current lifecycle state of an assembly line.
  rpc GetAssemblyLineStatus(AssemblyLineID) returns (LifecycleStatus);

  // AdvanceLifecycle transitions an assembly line to the next state.
  // Enforces state-machine gates (INTAKE → DESIGN → SCAFFOLD → BUILD → VERIFY → DELIVERED).
  rpc AdvanceLifecycle(LifecycleAdvance)    returns (LifecycleStatus);

  // ── Self-modification — skill versioning (Phase 7, Option A) ────────────────

  // UpdateSkill proposes a new version of an agent's skill.
  // Must pass Safety Rail. Returns a MerkleProof on success.
  rpc UpdateSkill(SkillUpdateRequest)       returns (MerkleProof);

  // ── Collective Intelligence (Phase 12) ──────────────────────────────────
  
  // ReconcileKnowledge proposes a local skill for global station reconciliation.
  // Returns a stream of ConsensusEvents (Proposed → Voting → Reconciled/Rejected).
  rpc ReconcileKnowledge(ReconciliationProposal) returns (stream ConsensusEvent);
}

// ─────────────────────────────────────────────────────────────────────────────
// Common types
// ─────────────────────────────────────────────────────────────────────────────

// Empty is used for RPCs that require no input.
message Empty {}

// OperationStatus is returned by RPCs that have no meaningful response payload.
message OperationStatus {
  // success is true if the operation completed without error.
  bool success = 1;
  // error_code is a machine-readable code if success is false.
  // Empty string when success is true.
  string error_code = 2;
  // message is a human-readable description of the result or error.
  string message = 3;
  // request_id is the UUIDv7 of the request that produced this status.
  string request_id = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// Factory lifecycle messages
// ─────────────────────────────────────────────────────────────────────────────

// FactoryRequest describes a new factory to be instantiated.
message FactoryRequest {
  // factory_type identifies the kind of factory (e.g., "synthetic-analyst").
  string factory_type = 1;
  // factory_name is the unique human-readable name for this instance.
  string factory_name = 2;
  // config_json is the factory-specific configuration as canonical JSON.
  bytes config_json = 3;
  // domain_metrics_extension declares domain-specific fitness metrics
  // this factory will emit. May be empty for factories with no domain metrics.
  DomainFitnessExtension domain_metrics = 4;
  // request_id is the UUIDv7 for this creation request.
  string request_id = 5;
}

// FactoryResponse is returned after a factory is successfully created.
message FactoryResponse {
  // factory_id is the assigned unique identifier for this factory instance.
  FactoryID factory_id = 1;
  // status describes the initial running state.
  FactoryStatus status = 2;
  // fitness_baseline is the initial fitness vector snapshot at factory start.
  FitnessSnapshot fitness_baseline = 3;
  // merkle_leaf_hash is the SHA-256 hex of the FactoryStarted Merkle leaf.
  string merkle_leaf_hash = 4;
}

// FactoryID uniquely identifies a factory instance.
message FactoryID {
  // id is the UUIDv7 assigned to this factory at creation time.
  string id = 1;
  // name is the human-readable factory name (same as FactoryRequest.factory_name).
  string name = 2;
}

// FactoryStatus describes the current operational state of a factory.
message FactoryStatus {
  // state is the current lifecycle state.
  FactoryState state = 1;
  // last_heartbeat_ms is the Unix ms timestamp of the last factory heartbeat.
  int64 last_heartbeat_ms = 2;
  // proposals_in_flight is the count of proposals currently under verification.
  int32 proposals_in_flight = 3;
  // error_message is populated when state is FACTORY_ERROR.
  string error_message = 4;
}

// FactoryList is returned by ListFactories.
message FactoryList {
  // factories is the list of all registered factory instances.
  repeated FactoryEntry factories = 1;
}

// FactoryEntry is a single entry in the factory list.
message FactoryEntry {
  // factory_id identifies this factory.
  FactoryID factory_id = 1;
  // status is the current operational status.
  FactoryStatus status = 2;
  // factory_type is the type of factory (e.g., "synthetic-analyst").
  string factory_type = 3;
}

// FactoryState enumerates factory lifecycle states.
enum FactoryState {
  // FACTORY_STATE_UNSPECIFIED should not appear in production.
  FACTORY_STATE_UNSPECIFIED = 0;
  // FACTORY_STARTING: factory is initializing, not yet ready.
  FACTORY_STARTING = 1;
  // FACTORY_RUNNING: factory is operational and accepting proposals.
  FACTORY_RUNNING = 2;
  // FACTORY_STOPPING: factory received StopFactory, draining in-flight work.
  FACTORY_STOPPING = 3;
  // FACTORY_STOPPED: factory has cleanly stopped.
  FACTORY_STOPPED = 4;
  // FACTORY_ERROR: factory encountered an unrecoverable error.
  FACTORY_ERROR = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// Safety pipeline messages
// ─────────────────────────────────────────────────────────────────────────────

// ActionProposal describes an agent-proposed action awaiting verification.
message ActionProposal {
  // id is the UUIDv7 proposal identifier.
  string id = 1;
  // agent_id identifies the submitting agent (e.g., "antigravity", "aethereum-spine").
  string agent_id = 2;
  // description is a human-readable summary of the proposed action (≤ 512 chars).
  string description = 3;
  // payload is the canonical JSON (RFC 8785) representation of the proposed action.
  bytes payload = 4;
  // payload_hash is the SHA-256 hex of payload, pre-computed by the caller.
  string payload_hash = 5;
  // target_path is the repo-relative path of the artifact this proposal modifies.
  // Empty for runtime-only proposals.
  string target_path = 6;
  // is_security_adjacent is true if this proposal touches core-station/security/, merkle-log/
  // schema, auth logic, proto/ contracts, or CLAUDE.md. Security-adjacent proposals
  // always require Translucent Gate human approval.
  bool is_security_adjacent = 7;
  // submitted_at_ms is the Unix epoch milliseconds of submission.
  int64 submitted_at_ms = 8;
}

// VerificationEvent is a single event in the SubmitProposal stream.
// The stream closes after a terminal event (Safe, Unsafe, Vetoed, or Error).
message VerificationEvent {
  // proposal_id is the UUIDv7 of the proposal this event relates to.
  string proposal_id = 1;
  // event_type describes what happened.
  VerificationEventType event_type = 2;
  // timestamp_ms is the Unix epoch milliseconds when this event occurred.
  int64 timestamp_ms = 3;
  // verdict is populated for VERIFICATION_SAFE and VERIFICATION_UNSAFE events.
  oneof result {
    // safe_result is populated when event_type is VERIFICATION_SAFE.
    SafeResult safe_result = 4;
    // unsafe_result is populated when event_type is VERIFICATION_UNSAFE.
    UnsafeResult unsafe_result = 5;
    // error_result is populated when event_type is VERIFICATION_ERROR.
    ErrorResult error_result = 6;
  }
  // policy_fingerprint_hex is the SHA-256 hex of the policy at this event.
  string policy_fingerprint_hex = 7;
}

// VerificationEventType enumerates events in the proposal lifecycle stream.
enum VerificationEventType {
  // VERIFICATION_EVENT_UNSPECIFIED should not appear in production.
  VERIFICATION_EVENT_UNSPECIFIED = 0;
  // VERIFICATION_RECEIVED: proposal accepted by the orchestrator.
  VERIFICATION_RECEIVED = 1;
  // VERIFICATION_CHECKING: Z3 verification in progress.
  VERIFICATION_CHECKING = 2;
  // VERIFICATION_SAFE: proposal passed all constraints.
  VERIFICATION_SAFE = 3;
  // VERIFICATION_UNSAFE: proposal violated ≥ 1 mandatory constraint.
  VERIFICATION_UNSAFE = 4;
  // VERIFICATION_GATE_PENDING: safe but security-adjacent; awaiting human approval.
  VERIFICATION_GATE_PENDING = 5;
  // VERIFICATION_GATE_APPROVED: human approved at the Translucent Gate.
  VERIFICATION_GATE_APPROVED = 6;
  // VERIFICATION_GATE_DENIED: human denied at the Translucent Gate.
  VERIFICATION_GATE_DENIED = 7;
  // VERIFICATION_COMMITTED: proposal committed; Merkle leaf written.
  VERIFICATION_COMMITTED = 8;
  // VERIFICATION_VETOED: Analyst Droid issued a veto.
  VERIFICATION_VETOED = 9;
  // VERIFICATION_TIMEOUT: Z3 verification exceeded time budget.
  VERIFICATION_TIMEOUT = 10;
  // VERIFICATION_ERROR: internal error during verification.
  VERIFICATION_ERROR = 11;
}

// SafeResult carries proof details for a successful verification.
message SafeResult {
  // proof_tier is the safety tier that produced this proof.
  SafetyTierProto proof_tier = 1;
  // proof_certificate_hex is the SHA-256 hex of the proof certificate bytes.
  string proof_certificate_hex = 2;
  // duration_ms is the verification duration (must be < 100ms for Tier1).
  int64 duration_ms = 3;
}

// UnsafeResult carries violation details for a failed verification.
message UnsafeResult {
  // violated_constraints is the list of constraint IDs that were violated.
  repeated string violated_constraint_ids = 1;
  // violation_details maps constraint ID → human-readable explanation.
  map<string, string> violation_details = 2;
  // unsat_core_ids is the minimal unsatisfiable core (may be empty).
  repeated string unsat_core_ids = 3;
  // remediation_hint is a suggested fix, if the safety layer can infer one.
  string remediation_hint = 4;
  // duration_ms is the verification duration.
  int64 duration_ms = 5;
}

// ErrorResult carries details for a VERIFICATION_ERROR event.
message ErrorResult {
  // error_code is a machine-readable error code.
  string error_code = 1;
  // message is a human-readable description.
  string message = 2;
}

// SafetyTierProto mirrors safety_rail::SafetyTier for proto encoding.
enum SafetyTierProto {
  // SAFETY_TIER_UNSPECIFIED should not appear in production.
  SAFETY_TIER_UNSPECIFIED = 0;
  // SAFETY_TIER_1: Z3 + Wasmtime.
  SAFETY_TIER_1 = 1;
  // SAFETY_TIER_2: Tier 1 + rocq-of-rust proof certificates.
  SAFETY_TIER_2 = 2;
}

// ApprovalRequest is sent by the human operator to approve a security-adjacent proposal.
message ApprovalRequest {
  // proposal_id is the UUIDv7 of the proposal being approved.
  string proposal_id = 1;
  // approval_signature is the operator's approval signature (Ed25519, base64url).
  string approval_signature = 2;
  // approved_by is the human identifier (e.g., "roy").
  string approved_by = 3;
  // approval_timestamp_ms is when the approval was signed.
  int64 approval_timestamp_ms = 4;
  // note is an optional human-readable justification for the approval.
  string note = 5;
}

// MerkleProof is returned after a proposal is committed to the audit log.
message MerkleProof {
  // leaf_hash_hex is the SHA-256 hex of the committed Merkle leaf.
  string leaf_hash_hex = 1;
  // tree_size is the total number of leaves in the log at commit time.
  int64 tree_size = 2;
  // root_hash_hex is the SHA-256 hex of the Merkle tree root at commit time.
  string root_hash_hex = 3;
  // inclusion_path contains the sibling hashes needed to verify inclusion.
  repeated string inclusion_path = 4;
  // sth_signature_hex is the Ed25519 hex signature over the Signed Tree Head.
  string sth_signature_hex = 5;
}

// VetoRequest is sent to issue a veto on a pending proposal.
message VetoRequest {
  // proposal_id is the UUIDv7 of the proposal being vetoed.
  string proposal_id = 1;
  // vetoed_by is the agent or human issuing the veto (e.g., "claude-code", "roy").
  string vetoed_by = 2;
  // rationale is a human-readable explanation of the veto. Required.
  string rationale = 3;
  // required_changes are the specific testable changes that must be made before
  // resubmission. Each entry is one actionable item.
  repeated string required_changes = 4;
  // veto_timestamp_ms is when the veto was issued.
  int64 veto_timestamp_ms = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// Fitness vector messages
// ─────────────────────────────────────────────────────────────────────────────

// FitnessSnapshot is the current state of the global fitness vector.
// Corresponds to the JSON structure in observability/fitness-vector-schema.json.
message FitnessSnapshot {
  // schema_version identifies the fitness vector schema version (e.g., "1.0.0").
  string schema_version = 1;
  // timestamp_ms is when this snapshot was taken.
  int64 timestamp_ms = 2;
  // metrics contains all five global metrics.
  FitnessMetrics metrics = 3;
  // domain_extensions contains domain-specific metrics from registered factories.
  map<string, DomainMetricValue> domain_extensions = 4;
}

// FitnessMetrics contains the five global fitness metrics.
message FitnessMetrics {
  // safety_compliance: violations/day. Any violation → escalation.
  MetricValue safety_compliance = 1;
  // audit_integrity: Merkle consistency failures. Any failure → escalation.
  MetricValue audit_integrity = 2;
  // dhamma_alignment: MoralWeighting score 0.0–1.0. < 0.6 → escalation.
  MetricValue dhamma_alignment = 3;
  // system_performance: composite of p99 latency and throughput.
  CompositeMetricValue system_performance = 4;
  // operational_cost: USD/day. > 20% week-over-week → escalation.
  MetricValue operational_cost = 5;
}

// MetricValue is the state of a single scalar metric.
message MetricValue {
  // current_value is the current measured value.
  double current_value = 1;
  // previous_value is the prior period value. 0 if no prior measurement.
  double previous_value = 2;
  // status is the current health status.
  MetricStatus status = 3;
  // last_updated_ms is when this metric was last updated.
  int64 last_updated_ms = 4;
  // escalation_triggered is true if auto-escalation conditions are met.
  bool escalation_triggered = 5;
  // note is an optional human-readable note from the emitting component.
  string note = 6;
}

// CompositeMetricValue is the state of a composite metric with sub-metrics.
message CompositeMetricValue {
  // sub_metrics maps sub-metric name → current value.
  map<string, double> sub_metrics = 1;
  // status is the overall composite health status.
  MetricStatus status = 2;
  // last_updated_ms is when this composite was last updated.
  int64 last_updated_ms = 3;
  // escalation_triggered is true if auto-escalation conditions are met.
  bool escalation_triggered = 4;
  // note is an optional human-readable note.
  string note = 5;
}

// DomainMetricValue is a domain-specific metric value from a factory.
message DomainMetricValue {
  // metric_name is the fully-qualified metric name (e.g., "rag_mrr").
  string metric_name = 1;
  // value is the current scalar value.
  double value = 2;
  // unit is the unit string (e.g., "percent", "ms", "score").
  string unit = 3;
  // status is the current health status.
  MetricStatus status = 4;
  // last_updated_ms is when this metric was last updated.
  int64 last_updated_ms = 5;
}

// MetricStatus enumerates health states for fitness metrics.
enum MetricStatus {
  // METRIC_STATUS_UNSPECIFIED should not appear in production.
  METRIC_STATUS_UNSPECIFIED = 0;
  // METRIC_UNINITIALIZED: no data has been collected yet.
  METRIC_UNINITIALIZED = 1;
  // METRIC_GREEN: healthy, within all thresholds.
  METRIC_GREEN = 2;
  // METRIC_AMBER: degrading but within auto-escalation threshold.
  METRIC_AMBER = 3;
  // METRIC_RED: threshold breached; auto-escalation triggered.
  METRIC_RED = 4;
}

// DomainFitnessExtension declares domain-specific metrics from a factory.
message DomainFitnessExtension {
  // factory_id identifies the factory registering these metrics.
  string factory_id = 1;
  // factory_type is the type of factory (e.g., "synthetic-analyst").
  string factory_type = 2;
  // metrics is the list of domain-specific metric declarations.
  repeated DomainMetricDeclaration metrics = 3;
}

// DomainMetricDeclaration declares a single domain-specific metric.
message DomainMetricDeclaration {
  // metric_id is the short identifier for this metric (no spaces, lowercase).
  string metric_id = 1;
  // display_name is the human-readable metric name.
  string display_name = 2;
  // description explains what this metric measures.
  string description = 3;
  // unit is the measurement unit (e.g., "percent", "ms", "score [0,1]").
  string unit = 4;
  // direction indicates whether higher or lower values are better.
  MetricDirection direction = 5;
  // escalation_threshold is the value at which this metric triggers escalation.
  double escalation_threshold = 6;
  // escalation_operator is the comparison operator for threshold evaluation.
  ThresholdOperator escalation_operator = 7;
  // otel_metric_name is the OTel metric name this maps to.
  string otel_metric_name = 8;
}

// MetricDirection indicates which direction is improvement.
enum MetricDirection {
  // METRIC_DIRECTION_UNSPECIFIED should not appear in production.
  METRIC_DIRECTION_UNSPECIFIED = 0;
  // METRIC_LOWER_IS_BETTER: lower values indicate improvement (e.g., latency).
  METRIC_LOWER_IS_BETTER = 1;
  // METRIC_HIGHER_IS_BETTER: higher values indicate improvement (e.g., accuracy).
  METRIC_HIGHER_IS_BETTER = 2;
}

// ThresholdOperator specifies the comparison for escalation threshold evaluation.
enum ThresholdOperator {
  // THRESHOLD_OPERATOR_UNSPECIFIED should not appear in production.
  THRESHOLD_OPERATOR_UNSPECIFIED = 0;
  // THRESHOLD_GTE: escalate if value >= threshold.
  THRESHOLD_GTE = 1;
  // THRESHOLD_GT: escalate if value > threshold.
  THRESHOLD_GT = 2;
  // THRESHOLD_LTE: escalate if value <= threshold.
  THRESHOLD_LTE = 3;
  // THRESHOLD_LT: escalate if value < threshold.
  THRESHOLD_LT = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// Dhamma context messages
// ─────────────────────────────────────────────────────────────────────────────

// DataContext provides context for a Dhamma reflection request.
message DataContext {
  // proposal_id is the UUIDv7 of the proposal requiring ethical weighting.
  string proposal_id = 1;
  // description is the human-readable description of the proposed action.
  string description = 2;
  // domain_context is additional domain-specific context (canonical JSON).
  bytes domain_context_json = 3;
}

// ReflectionResult is the scored Dhamma reflection for a data context.
message ReflectionResult {
  // proposal_id is the UUIDv7 this reflection covers.
  string proposal_id = 1;
  // moral_weighting is the structured ethical assessment.
  MoralWeighting moral_weighting = 2;
  // retrieved_segments is the list of Pāḷi segments used in this reflection.
  repeated BIlaraSegment retrieved_segments = 3;
  // computed_at_ms is when this reflection was computed.
  int64 computed_at_ms = 4;
}

// MoralWeighting is the structured ethical assessment from the Dhamma-Adviser.
// This is evidence in the audit log, not decorative prose.
message MoralWeighting {
  // score is the aggregate moral alignment score, 0.0–1.0.
  // < 0.6 triggers auto-escalation regardless of other metrics.
  double score = 1;
  // root classifies the action's moral root.
  MoralRoot root = 2;
  // citation_ids are the Bilara segment IDs of the retrieved Pāḷi texts.
  repeated string citation_ids = 3;
  // reasoning is a structured explanation of the score. Not freeform prose —
  // it references specific citation_ids and semantic_map entries.
  string reasoning = 4;
  // semantic_map_version is the version hash of the semantic mapping table used.
  string semantic_map_version = 5;
}

// MoralRoot classifies the moral root of an action per Theravāda analysis.
enum MoralRoot {
  // MORAL_ROOT_UNSPECIFIED should not appear in production.
  MORAL_ROOT_UNSPECIFIED = 0;
  // MORAL_ROOT_KUSALA: wholesome root (non-greed, non-hatred, non-delusion).
  MORAL_ROOT_KUSALA = 1;
  // MORAL_ROOT_AKUSALA: unwholesome root (greed, hatred, or delusion present).
  MORAL_ROOT_AKUSALA = 2;
  // MORAL_ROOT_NEUTRAL: neither wholesome nor unwholesome.
  MORAL_ROOT_NEUTRAL = 3;
}

// BIlaraSegment is a single retrieved Pāḷi segment with its Bilara address.
message BIlaraSegment {
  // segment_id is the Bilara segment address (e.g., "dn1:1.1.1").
  string segment_id = 1;
  // pali_text is the original Pāḷi text of the segment.
  string pali_text = 2;
  // translation is the English translation (SuttaCentral Bilara translation).
  string translation = 3;
  // stylometric_score is the early-style classifier score (0.0–1.0).
  // Only segments scoring ≥ 0.95 are eligible for retrieval.
  double stylometric_score = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// Analyst interface messages
// ─────────────────────────────────────────────────────────────────────────────

// Briefing is written by AntiGravity to request Analyst Droid review.
message Briefing {
  // briefing_id is the UUIDv7 for this briefing.
  string briefing_id = 1;
  // topic is the short slug for this briefing (e.g., "phase2-tier1-complete").
  string topic = 2;
  // author is the agent writing this briefing (always "antigravity").
  string author = 3;
  // phase is the project phase this briefing covers (e.g., "2").
  string phase = 4;
  // summary_markdown is the full briefing content in Markdown.
  // Must follow the analyst-inbox file format.
  string summary_markdown = 5;
  // artifacts lists the file paths of artifacts ready for review.
  repeated string artifacts = 6;
  // questions lists specific questions for the Analyst Droid.
  repeated string questions = 7;
  // submitted_at_ms is the Unix ms timestamp of submission.
  int64 submitted_at_ms = 8;
}

// VerdictQuery asks for a verdict by topic or proposal ID.
message VerdictQuery {
  oneof query {
    // topic queries by the briefing topic slug.
    string topic = 1;
    // proposal_id queries by the UUIDv7 proposal ID.
    string proposal_id = 2;
    // briefing_id queries by the briefing UUIDv7.
    string briefing_id = 3;
  }
}

// AnalystVerdict carries the result of a Claude Code review.
message AnalystVerdict {
  // verdict_id is the UUIDv7 of this verdict.
  string verdict_id = 1;
  // artifact_path is the path of the artifact or proposal reviewed.
  string artifact_path = 2;
  // verdict is the decision.
  VerdictDecision verdict = 3;
  // rationale is the precise technical reasoning for the verdict.
  string rationale = 4;
  // required_changes lists specific, testable changes required (for VETOED/CONDITIONAL).
  repeated string required_changes = 5;
  // fitness_impact_notes describes the projected fitness vector impact.
  string fitness_impact_notes = 6;
  // issued_at_ms is when this verdict was written.
  int64 issued_at_ms = 7;
}

// VerdictDecision is the Analyst Droid's decision.
enum VerdictDecision {
  // VERDICT_UNSPECIFIED should not appear in production.
  VERDICT_UNSPECIFIED = 0;
  // VERDICT_APPROVED: artifact is approved; AntiGravity may proceed.
  VERDICT_APPROVED = 1;
  // VERDICT_VETOED: artifact is blocked; required changes must be addressed.
  VERDICT_VETOED = 2;
  // VERDICT_CONDITIONAL: approved with conditions; listed changes must be completed.
  VERDICT_CONDITIONAL = 3;
}

// RegistrationResult is returned by RegisterDomainMetrics.
message RegistrationResult {
  // success is true if the metrics were accepted.
  bool success = 1;
  // factory_id is the factory whose metrics were registered.
  string factory_id = 2;
  // registered_count is how many metrics were accepted.
  int32 registered_count = 3;
  // error_message is populated if success is false.
  string error_message = 4;
}
// MetricReport carries domain-specific metric updates from a factory.
message MetricReport {
  // factory_id of the submitting factory instance.
  string factory_id = 1;
  // metrics maps metric ID to current scalar value.
  // Example: {"defi_coverage": 85.2, "rag_quality": 0.88}
  map<string, double> metrics = 2;
  // observed_at_ms is the Unix ms timestamp of the measurement.
  int64 observed_at_ms = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// Assembly line lifecycle messages (Phase 7)
// ─────────────────────────────────────────────────────────────────────────────

// SpecDocument is the authoritative requirements document for a new service.
// Built incrementally during the INTAKE phase via Requirements Advisor tools.
message SpecDocument {
  // id is the UUIDv7 specimen identifier.
  string id = 1;
  // service_name is the human-readable slug for the service.
  string service_name = 2;
  // description is a high-level summary of the service's purpose.
  string description = 3;
  // requirements is the list of functional and non-functional requirements.
  repeated Requirement requirements = 4;
  // challenges records Roy's responses to Analyst Droid architectural challenges.
  repeated ChallengeRecord challenges = 5;
  // acceptance_criteria defines the testable benchmarks for DELIVERY.
  repeated AcceptanceCriterion acceptance_criteria = 6;
  // deployment_target specifies where the service will run.
  DeploymentTarget deployment_target = 7;
  // primary_language is inferred or explicitly selected (Go, Rust, Python, etc.).
  string primary_language = 8;
  // is_finalized is true if Roy has called finalize_spec.
  bool is_finalized = 9;
  // approved_at_ms is when the Analyst Droid issued an APPROVED verdict.
  int64 approved_at_ms = 10;
}

// Requirement is a single unit of functionality or constraint.
message Requirement {
  // id is the UUIDv7 for this requirement.
  string id = 1;
  // text is the requirement description verbatim.
  string text = 2;
  // category indicates the type of requirement.
  RequirementCategory category = 3;
}

// RequirementCategory enumerates types of requirements.
enum RequirementCategory {
  REQUIREMENT_UNSPECIFIED = 0;
  REQUIREMENT_FUNCTIONAL = 1;
  REQUIREMENT_PERFORMANCE = 2;
  REQUIREMENT_SECURITY = 3;
  REQUIREMENT_OPERATIONAL = 4;
  REQUIREMENT_INTERFACE = 5;
}

// ChallengeRecord captures Roy's architectural decisions.
message ChallengeRecord {
  // id is the UUIDv7 for this record.
  string id = 1;
  // challenge is the Analyst Droid's question or concern.
  string challenge = 2;
  // response is Roy's verbatim response.
  string response = 3;
}

// AcceptanceCriterion defines a testable goal.
message AcceptanceCriterion {
  // id is the UUIDv7 for this criterion.
  string id = 1;
  // text is the goal description.
  string text = 2;
  // metric is the OTel metric ID used to verify this (optional).
  string metric = 3;
}

// DeploymentTarget describes the runtime environment.
message DeploymentTarget {
  // target_type: LOCAL | CONTAINER | AWS | GCP.
  string target_type = 1;
  // config_json is target-specific configuration.
  bytes config_json = 2;
}

// AssemblyLine represents a software service creation instance.
message AssemblyLine {
  // id is the UUIDv7 for this assembly line.
  string id = 1;
  // spec_id refers to the underlying SpecDocument.
  string spec_id = 2;
  // service_name matches the SpecDocument.service_name.
  string service_name = 3;
  // current_state: INTAKE → DESIGN → SCAFFOLD → BUILD → VERIFY → DELIVERED.
  LifecycleState current_state = 4;
  // created_at_ms is the Unix inception timestamp.
  int64 created_at_ms = 5;
  // last_pulse_ms is the last recorded pulse from the factory worker.
  int64 last_pulse_ms = 6;
}

// AssemblyLineID uniquely identifies an assembly line.
message AssemblyLineID {
  string id = 1;
}

// LifecycleStatus wraps the LifecycleState enum for gRPC returns.
message LifecycleStatus {
  LifecycleState state = 1;
}

// LifecycleState enumerates the gated states of an assembly line.
enum LifecycleState {
  LIFECYCLE_UNSPECIFIED = 0;
  // INTAKE: requirements gathering (Requirements Advisor active).
  LIFECYCLE_INTAKE = 1;
  // DESIGN: spec finalized; awaiting Analyst Droid approval.
  LIFECYCLE_DESIGN = 2;
  // SCAFFOLD: initial code/tests generation (Scaffold Engine active).
  LIFECYCLE_SCAFFOLD = 3;
  // BUILD: service logic implementation (Worker active).
  LIFECYCLE_BUILD = 4;
  // VERIFY: quality assessment and criteria verification.
  LIFECYCLE_VERIFY = 5;
  // DELIVERED: service is operational and committed.
  LIFECYCLE_DELIVERED = 6;
  // ABANDONED: assembly line stopped before delivery.
  LIFECYCLE_ABANDONED = 7;
}

// LifecycleAdvance carries the instruction to move to a new state.
message LifecycleAdvance {
  // assembly_line_id is the target instance.
  string assembly_line_id = 1;
  // target_state is the desired next state.
  LifecycleState target_state = 2;
  // justification is the rationale for the transition.
  string justification = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// Skill versioning messages (Phase 7/8)
// ─────────────────────────────────────────────────────────────────────────────

// SkillUpdateRequest proposes a new version of an agent's skill.
message SkillUpdateRequest {
  // agent_id identifies the agent (e.g., "synthetic-analyst-01").
  string agent_id = 1;
  // skill_name is the identifier for the skill (e.g., "pali_retrieval").
  string skill_name = 2;
  // current_version_hash is the SHA-256 hex of the skill currently in use.
  string current_version_hash = 3;
  // new_content is the proposed new skill content (code, prompt, or Prolog clauses).
  bytes new_content = 4;
  // rationale explains the improvement (or fix).
  string rationale = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// Collective Intelligence messages (Phase 12)
// ─────────────────────────────────────────────────────────────────────────────

// ReconciliationProposal describes a local skill for global promotion.
message ReconciliationProposal {
  // proposal_id is the unique UUID for this consensus event.
  string proposal_id = 1;
  // source_agent_id identifies the ship that learned the skill.
  string source_agent_id = 2;
  // term_atoms is the Prolog representation of the logic.
  string term_atoms = 3;
  // fitness_score is the measured performance impact [0,1].
  double fitness_score = 4;
  // merkle_root is the ship's current audit trail root.
  string merkle_root = 5;
  // merkle_proof is the witness for this specific mutation.
  repeated string merkle_proof = 6;
}

// ConsensusEvent describes a step in the reconciliation lifecycle.
message ConsensusEvent {
  // proposal_id matches the ReconciliationProposal.
  string proposal_id = 1;
  // state is the current phase of consensus.
  ConsensusState state = 2;
  // voters is the count of ships that have verified the proposal.
  int32 voters = 3;
  // quorum_reached is true if the station-wide threshold is met.
  bool quorum_reached = 4;
  // message is a human-readable status note.
  string message = 5;
}

// ConsensusState enumerates the phases of the reconciliation protocol.
enum ConsensusState {
  CONSENSUS_PROPOSED = 0;
  CONSENSUS_VOTING = 1;
  CONSENSUS_RECONCILED = 2;
  CONSENSUS_REJECTED = 3;
}
