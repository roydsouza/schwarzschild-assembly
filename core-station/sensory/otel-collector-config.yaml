# OpenTelemetry Collector Configuration — Aethereum-Spine
# Target hardware: Apple M5 Pro/Max, macOS Tahoe
# Hybrid export: local file (cold-readable by agents) + Prometheus scrape endpoint
#
# Start: otelcol-contrib --config observability/otel-collector-config.yaml
# Prometheus metrics: http://localhost:8888/metrics
# OTLP gRPC: localhost:4317
# OTLP HTTP: localhost:4318

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 4
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:3000"  # control-panel dev server
            - "http://localhost:3001"

  # Prometheus self-scrape for collector health metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 10s
          static_configs:
            - targets: ["0.0.0.0:8888"]

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    check_interval: 1s
    # M5 Pro has ample RAM; keep collector footprint small
    limit_mib: 512
    spike_limit_mib: 128

  resource:
    attributes:
      - key: service.namespace
        value: aethereum-spine
        action: insert
      - key: host.arch
        value: arm64
        action: insert
      - key: deployment.environment
        value: local-m5
        action: insert

  # Filter: only pass fitness vector metrics to the snapshot writer pipeline
  filter/fitness_vector:
    metrics:
      include:
        match_type: regexp
        metric_names:
          - "^aethereum_spine\\.fitness\\..*"
          - "^aethereum_spine\\.safety\\..*"
          - "^aethereum_spine\\.audit\\..*"
          - "^aethereum_spine\\.dhamma\\..*"
          - "^aethereum_spine\\.perf\\..*"
          - "^aethereum_spine\\.cost\\..*"

exporters:
  # Primary: write all telemetry to rotating JSONL file
  # Each line is a complete OTLP JSON export; agents read last valid line
  file/all:
    path: ./otel-snapshots/telemetry.jsonl
    rotation:
      max_megabytes: 50
      max_days: 7
      max_backups: 3
    format: json

  # Fitness vector only: written to latest.json for cold reads
  # This is the file agents poll; it is overwritten on each export cycle
  file/fitness:
    path: ./otel-snapshots/latest.json
    rotation:
      max_megabytes: 1
      max_days: 1
      max_backups: 1
    format: json

  # Prometheus scrape endpoint — optional, does not need to be running
  # for agent operation. Used for future Grafana dashboards.
  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: aethereum_spine
    const_labels:
      project: aethereum-spine
      environment: local-m5

  # Debug exporter: verbose output in development
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    # All metrics: Prometheus + full telemetry file
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus, file/all]

    # Fitness vector metrics: also write to latest.json for cold reads
    metrics/fitness:
      receivers: [otlp]
      processors: [memory_limiter, filter/fitness_vector, batch, resource]
      exporters: [file/fitness]

    # Traces: full telemetry file only
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [file/all]

    # Logs: full telemetry file only
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [file/all]

  telemetry:
    logs:
      level: warn
      output_paths: ["./otel-snapshots/collector.log"]
    metrics:
      level: basic
      address: 0.0.0.0:18888
